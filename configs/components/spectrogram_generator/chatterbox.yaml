encoder_layers: 6

# values are taken from instantiation at https://github.com/resemble-ai/chatterbox/blob/master/src/chatterbox/models/s3gen/s3gen.py
_target_: quick_convert.components.spectrogram_generator.chatterbox.ChatterboxSpectrogramGenerator
backbone:
  _target_: quick_convert.external.chatterbox.s3gen.flow.CausalMaskedDiffWithXvec

  # encoder has to accept `tokens` and `token_sizes` in the forward method and have a property accessible by a function `output_size()`
  encoder:
    # this is a placeholder because the upsampling conformer is not necessary. Subject to change, replaced by something in `quick_convert.components.layers`
    _target_: quick_convert.external.chatterbox.bridges.conformer.ConformerEncoder
    input_dim: ${spectrogram_generator_encoder_input_size}
    size: ${components.spectrogram_generator.encoder_layers}
    output_size: 512
  decoder:
    _target_: quick_convert.external.chatterbox.s3gen.flow_matching.CausalConditionalCFM
    spk_emb_dim: 80
    cfm_params:
      _target_: hydra.utils.get_object
      path: quick_convert.external.chatterbox.s3gen.configs.CFM_PARAMS
    estimator:
      _target_: quick_convert.external.chatterbox.s3gen.decoder.ConditionalDecoder
      in_channels: 320
      out_channels: 80
      causal: true
      channels:
        - 256
      dropout: 0.
      attention_head_dim: 64
      n_blocks: 4
      num_mid_blocks: 12
      num_heads: 8
      act_fn: "gelu"
      meanflow: false
