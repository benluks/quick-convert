# this is the one system where the target is an abstraction, i.e. it takes a base trainer type (e.g. `lightning_trainer`)
# and then passes the specific class. It's because these types are redundant, i.e. `controllable_rvq` is always a lightning trainer.

defaults:
  - /components/encoders@encoder: rvq_disentangler
  - /components/spectrogram_generator@decoder: chatterbox
  - _self_

_target_: quick_convert.pipelines.training.lightning_trainer.LightningTrainer
module:
  _target_: quick_convert.pipelines.training.modules.encoder_decoder.controllable_rvq.ControllableRVQTrainingModule
  encoder: ${encoder}
  decoder: ${decoder}
  spk_encoder: SpeakerEncoder,
  emo_encoder: ContentEncoder,
  tokenizer:
    _target_: sentencepiece.SentencePieceProcessor,
  decoder_loss_weight: float,
  rvq_loss_weights: dict[str, float],
  distillation_loss_weights: dict[str, float],
  adv_loss_weights: dict[str, float],
  pros_encoder:
  lr_scheduler_cls: null
  lr_scheduler_kwargs: null
  optimizer_cls: torch.optim.AdamW
  optimizer_kwargs:
    weight_ddecay: 1e-2
train_dataloader_kwargs: null
val_dataloader_kwargs: null
