# configs/run/infer_controllable_rvq_dac.yaml
defaults:
  - /global: default
  - /components/encoders@encoder: rvq_disentangler_v2
  - /architecture: controllable_rvq_v2
  - /trainer/optimizer@optimizer: adamw
  - _self_


_target_: quick_convert.pipelines.training.modules.ControllableRVQTrainingModule
encoder: ${module.encoder}
decoder: ${architecture.decoder}

tokenizer_pad_id: 0
decoder_loss_weight: 1.0

rvq_loss_weights:
  commitment_loss: 0.25
  codebook_loss: 1.0
  mse_loss: 0.01
  load_balancing_loss: 1.0

distillation_loss_weights:
  ling: 1.0
  spk: 10.0
  emo: 1.0
  pros: 1.0

adv_loss_weights:
  spk_ling: 1.0
  spk_pros: 1.0
  ling_spk: 1.0
  ling_pros: 1.0

optimizer:
  lr: 1e-4
  weight_decay: 1e-2

lr_scheduler: null
adv_loss_hold_off: 1000
