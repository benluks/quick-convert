# configs/pipeline/train_module.yaml

_target_: quick_convert.pipelines.training.module.ModuleTrainingPipeline

module: ${module}
batch_size: 8
val_batch_size: ${pipeline.batch_size}

train_dataset: ${train_dataset}
val_dataset: ${val_dataset}

dataloader:
  num_workers: 4
  pin_memory: true
  drop_last: false

train_dataloader_kwargs:
  batch_size: ${pipeline.batch_size}
  shuffle: true
  num_workers: ${pipeline.dataloader.num_workers}
  pin_memory: ${pipeline.dataloader.pin_memory}
  drop_last: ${pipeline.dataloader.drop_last}

val_dataloader_kwargs:
  batch_size: ${pipeline.val_batch_size}
  shuffle: false
  num_workers: ${pipeline.dataloader.num_workers}
  pin_memory: ${pipeline.dataloader.pin_memory}
  drop_last: ${pipeline.dataloader.drop_last}

trainer_kwargs:
  max_epochs: ${max_epochs}
  accelerator: auto
  devices: auto
  precision: 32
  log_every_n_steps: 10
  default_root_dir: ${out_root}/${module}/${dataset}
  enable_checkpointing: true
  enable_progress_bar: true
  enable_model_summary: true

