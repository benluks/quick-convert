# @package architecture
# configs/architecture/controllable_rvq.yaml

defaults:
  - /components/ssl@emotion_ssl: emo2vec
  - /components/ssl@content_ssl: w2vbert
  - /components/encoders@encoder: rvq_disentangler
  - /components/decoders@decoder: chatterbox
  - /components/layers@encoder.rvq: rvq
  - /components/encoders@decoder.flow.encoder: conformer_encoder
  - /components/encoders@content_encoder: conformer_encoder_ssl
  - _self_

# probably won't need more than 256
encoder_dim: 256
num_feature_layers: 24

tokenizer_model_path: outputs/tokenizer/librispeech_1000_tokens/tokenizer.model
tokenizer_vocab_size: 1000

mel_dim: 80

feature_extractors:
  content: ${..content_ssl}
  emotion: ${..emotion_ssl}

content_encoder:
  input_dim: ${..content_ssl.feature_dim}
  embed_dim: ${..encoder_dim}
  num_ssl_layers: ${..num_feature_layers}

encoder:
  rvq:
    input_dim: ${...content_encoder.embed_dim}
    n_codebooks: 8
    codebook_size: 1024
    codebook_dim: 16
    quantizer_dropout: 0.0

  # rvq_dim: ${mul:${architecture.rvq.n_codebooks},${architecture.rvq.codebook_dim}}

  emotion_head:
    _target_: quick_convert.components.encoders.LinearHead
    input_dim: ${..rvq.input_dim}
    output_dim: ${...feature_extractors.emotion.feature_dim}

  linguistic_head:
    hidden_dim: ${..rvq.input_dim}
    loss:
      hidden_dim: ${...rvq.input_dim}
      output_dim: ${....tokenizer_vocab_size}

  speaker_head:
    input_dim: ${..rvq.input_dim}
    hidden_dim: 256
    output_dim: 128 #Number of speakers#${architecture.feature_extractors.speaker.feature_dim}
    supervision: aam
    loss:
      in_dim: ${..output_dim}

  prosody_head: null

  router:
    _target_: quick_convert.components.encoders.RVQLayerRouter
    n_classes: 3
    codebook_dim: ${..rvq.codebook_dim}
    codebook_size: ${..rvq.codebook_size}
    gumbel_tau: 1.0
# _target_: quick_convert.components.encoders.LinearHead
# input_dim: ${architecture.ssl_dim}
# output_dim: ${architecture.emotion_dim}

decoder:
  cond_strategy: null
  flow:
    spk_embed_dim: ${...encoder.speaker_head.output_dim}
    vocab_size: null
    encoder:
      num_blocks: 6
      embed_dim: 256
      # hardcoded for now. 2 because ling_q +  emo_pros_q
      input_dim: ${mul:2,${....encoder_dim}}
    decoder:
      estimator:
        in_channels: ${mul:${add:3,${bool:${....cond_strategy}}},${.....mel_dim}}
