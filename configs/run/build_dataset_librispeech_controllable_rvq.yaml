# @package _global_

defaults:
  - /global: default
  - /pipeline: null
  - /dataset: librispeech
  - _self_

resources_path: outputs/precomputed/${hydra:runtime.choices.dataset}
dataset:
  splits:
    - test-other
  load: false
  pattern: "**/1688*.flac"
  resource_providers:
    - ${dataset.transcript_provider}
    - _target_: quick_convert.data.resources.PathResourceProvider
      name: w2vbert
      path_template: ${resources_path}/w2vbert/{sample.split}/{sample.utt_id}.pt
    - _target_: quick_convert.data.resources.PathResourceProvider
      name: spk_espnet
      path_template: ${resources_path}/spk_espnet/{sample.split}/{sample.utt_id}.pt
    - _target_: quick_convert.data.resources.PathResourceProvider
      name: emo2vec
      path_template: ${resources_path}/emo2vec/{sample.split}/{sample.utt_id}.pt
