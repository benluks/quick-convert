# @package _global_

defaults:
  - /global: default
  - /pipeline: training
  - /trainer: vq_asr
  - /dataset@train_dataset: librispeech
  - /dataset@val_dataset: librispeech
  - /dataset@source_dataset: librispeech
  - /components/ssl@trainer.module.online_encoders.content: w2vbert
  - _self_

dataset_name: ${hydra:runtime.choices.dataset@source_dataset}
resources_path: outputs/precomputed/${dataset_name}
dataset_path: ${out_root}/${dataset_name}

pipeline:
  batch_size: 2
  dataloader:
    num_workers: 1

trainer:
  ddp:
    enabled: false
  compile: false
  module:
    commitment_loss_weight: 0.1
    codebook_loss_weight: 0.1

data: &data
  # compute info from sample
  # resources:
  #   transcript:
  #     column: transcript
  #     kind: text
  resource_providers:
    - _target_: quick_convert.data.resources.PathResourceProvider
      kind: token_ids
      name: token_ids
      path_template: ${resources_path}/tokenizer/{sample.split}/{sample.utt_id}.pt
    - ${train_dataset.transcript_provider}

  load:
    - audio
    - token_ids

train_dataset:
  <<: *data
  splits:
    - train-clean-100

val_dataset:
  <<: *data
  splits:
    - dev-clean
