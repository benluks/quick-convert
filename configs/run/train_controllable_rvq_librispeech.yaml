# @package _global_

defaults:
  - /global: default
  - /pipeline: training
  - /trainer: controllable_rvq
  - /dataset@train_dataset: manifest
  - /dataset@val_dataset: manifest
  - /dataset@source_dataset: librispeech
  - _self_

dataset_name: ${hydra:runtime.choices.dataset@source_dataset}
resources_path: outputs/precomputed/${dataset_name}
dataset_path: ${out_root}/${dataset_name}

pipeline:
  batch_size: 32

trainer:
  train_dataloader_kwargs:
    shuffle: true

data: &data
  resource_providers:
    # - ${source_dataset.transcript_provider}
    - _target_: quick_convert.data.resources.PathResourceProvider
      kind: torch_tensor
      name: content
      path_template: ${resources_path}/w2vbert/{sample.split}/{sample.utt_id}.pt
    - _target_: quick_convert.data.resources.PathResourceProvider
      kind: torch_tensor
      name: emo2vec
      path_template: ${resources_path}/emo2vec/{sample.split}/{sample.utt_id}.pt
    - _target_: quick_convert.data.resources.PathResourceProvider
      kind: torch_tensor
      name: spk
      path_template: ${resources_path}/espnet_wavlm-ecapa-joint/{sample.split}/{sample.utt_id}.pt
    # intended resource name : column name
    # key is the name of the desired resource
  resources:
    transcript:
      # name of column in csv
      column: transcript
      kind: text

  load:
    - audio
    - transcript
    - content
    - emo2vec
    - spk

train_dataset:
  <<: *data
  manifest_path:
    - ${dataset_path}/train-clean-100/manifest.csv
    - ${dataset_path}/train-clean-360/manifest.csv
    - ${dataset_path}/train-other-500/manifest.csv

val_dataset:
  <<: *data
  manifest_path:
    - ${dataset_path}/dev-clean/manifest.csv
    - ${dataset_path}/dev-other/manifest.csv
